name: Release

on:
  push:
    branches: [main]

# Only allow one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release
    runs-on: windows-latest

    # Required for creating GitHub releases and uploading assets
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for delta generation

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ── Extract version from CreAppConfig.cs ──────────────────────────
      - name: Extract version
        id: version
        shell: bash
        run: |
          version=$(sed -n 's/.*VersionText\s*=\s*"\([^"]*\)".*/\1/p' "src/App/ChaosRecipeEnhancer.UI/Models/Config/CreAppConfig.cs")
          if [ -z "$version" ]; then
            echo "::error::Could not extract VersionText from CreAppConfig.cs"
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          echo "TAG=v$version" >> "$GITHUB_OUTPUT"
          echo "::notice::Detected version: $version"

      # ── Check if this version was already released ────────────────────
      - name: Check for existing release
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.TAG }}"
          if gh release view "$tag" > /dev/null 2>&1; then
            echo "::notice::Release $tag already exists, skipping"
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Release $tag not found, proceeding with release"
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build ─────────────────────────────────────────────────────────
      - name: Restore
        if: steps.check.outputs.SKIP != 'true'
        run: |
          dotnet restore src/App/ChaosRecipeEnhancer.UI/ChaosRecipeEnhancer.UI.csproj
          dotnet restore src/App/ChaosRecipeEnhancer.UI.Tests/ChaosRecipeEnhancer.UI.Tests.csproj

      - name: Test
        if: steps.check.outputs.SKIP != 'true'
        run: dotnet test src/App/ChaosRecipeEnhancer.UI.Tests/ChaosRecipeEnhancer.UI.Tests.csproj -c Release --verbosity normal

      - name: Publish
        if: steps.check.outputs.SKIP != 'true'
        run: >-
          dotnet publish
          src/App/ChaosRecipeEnhancer.UI/ChaosRecipeEnhancer.UI.csproj
          -c Release
          --self-contained
          -r win-x64
          -o ./publish

      # ── Velopack Package ──────────────────────────────────────────────
      - name: Install vpk
        if: steps.check.outputs.SKIP != 'true'
        run: dotnet tool install -g vpk

      - name: Download previous release (for delta generation)
        if: steps.check.outputs.SKIP != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # vpk download may fail if this is the very first release — that's OK
          if ! vpk download github \
            --repoUrl "https://github.com/${{ github.repository }}" \
            --token "$GH_TOKEN" 2>&1; then
            echo "::notice::No previous release found (first release?). Delta will be skipped."
          fi

      - name: Pack release
        if: steps.check.outputs.SKIP != 'true'
        run: >-
          vpk pack
          --packId ChaosRecipeEnhancer
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir ./publish
          --mainExe ChaosRecipeEnhancer.exe
          --icon src/App/ChaosRecipeEnhancer.UI/Assets/Icons/CREIcon.ico

      # ── Upload to GitHub Releases ─────────────────────────────────────
      - name: Upload release
        if: steps.check.outputs.SKIP != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --tag ${{ steps.version.outputs.TAG }}
          --token ${{ env.GH_TOKEN }}
          --releaseName "ChaosRecipeEnhancer ${{ steps.version.outputs.TAG }}"
          --publish
