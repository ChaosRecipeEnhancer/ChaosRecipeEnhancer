name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ChaosRecipeEnhancer.sln

      - name: Build
        run: dotnet build ChaosRecipeEnhancer.sln -c Release --no-restore

      - name: Test
        run: dotnet test ChaosRecipeEnhancer.sln -c Release --no-build --verbosity normal
